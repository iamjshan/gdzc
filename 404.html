<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>绥化水文智能管理平台</title>
  <script>
    // GitHub Pages SPA 路由支持
    // 将路径转换为 hash 路由
    var path = window.location.pathname;
    var repo = '/gdzc'; // 仓库名称
    
    // 如果路径包含仓库名，移除它
    if (path.indexOf(repo) === 0) {
      path = path.substring(repo.length);
    }
    
    // 保存原始路径到 sessionStorage
    sessionStorage.setItem('redirect', path + window.location.search + window.location.hash);
    
    // 重定向到首页
    window.location.href = repo + '/';
  </script>
</head>
<body>
  <p>页面跳转中...</p>
</body>
</html>
