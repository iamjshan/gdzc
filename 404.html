<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>页面未找到</title>
  <script>
    // 单页应用(SPA)路由回退处理
    // 将当前路径保存到 sessionStorage，然后重定向到首页
    var redirectPath = window.location.pathname + window.location.search + window.location.hash;
    sessionStorage.setItem('redirectPath', redirectPath);
    window.location.replace('/gdzc/');
  </script>
</head>
<body>
  <p>页面未找到，正在重定向到首页...</p>
</body>
</html>
