name: Supabase 保活

on:
  schedule:
    # 每天北京时间 9:00 和 21:00 各 ping 一次
    # UTC 时间 = 北京时间 - 8 小时
    - cron: '0 1,13 * * *'
  workflow_dispatch:  # 允许手动点击运行

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        run: |
          echo "开始 ping Supabase..."
          curl -s -o /dev/null -w "HTTP状态码: %{http_code}\n" \
            -H "apikey: ${{ secrets.SUPABASE_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_KEY }}" \
            "${{ secrets.SUPABASE_URL }}/rest/v1/assets?select=id&limit=1"
          echo "保活完成 ✅"
