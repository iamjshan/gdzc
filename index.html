<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <base href="/gdzc/">
    <link rel="stylesheet" href="./assets/uni.8e1dd610.css">

    <meta charset="UTF-8" />
    <script>
      // 处理 GitHub Pages SPA 路由回退
      (function() {
        var redirectPath = sessionStorage.getItem('redirectPath');
        if (redirectPath && redirectPath !== '/') {
          sessionStorage.removeItem('redirectPath');
          // 移除 /gdzc 前缀，因为 base href 已经设置了 /gdzc/
          var relativePath = redirectPath.replace(/^\/gdzc/, '');
          history.replaceState(null, null, relativePath || '/');
        }
      })();
    </script>
    <script>
      var coverSupport = 'CSS' in window && typeof CSS.supports === 'function' && (CSS.supports('top: env(a)') ||
        CSS.supports('top: constant(safe-area-inset-top)'))
      document.write(
        '<meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0' +
        (coverSupport ? ', viewport-fit=cover' : '') + '" />')
    </script>
    <title>绥化水文</title>
    <!--preload-links-->
    <!--app-context-->
    <script type="module" crossorigin src="./assets/index-Ukkv-uys.js"></script>
    <link rel="stylesheet" crossorigin href="./assets/index-yltAhM2x.css">
  </head>

  </body>
</html>
